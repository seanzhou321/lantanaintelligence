  <script>
    // Inline markdown-to-HTML renderer — no external dependencies
    function renderMd(md) {
      function esc(s) {
        return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }
      function inline(s) {
        return esc(s)
          .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/\*(.+?)\*/g, '<em>$1</em>')
          .replace(/`([^`]+)`/g, '<code>$1</code>');
      }

      var lines = md.split('\n');
      var out = [];
      var listType = null;
      var para = [];

      function flushPara() {
        if (para.length) {
          var parts = para.map(function(item) {
            if (item.endsWith('  ')) { return inline(item.slice(0, -2)) + '<br>'; }
            return inline(item);
          });
          out.push('<p>' + parts.join(' ') + '</p>');
          para = [];
        }
      }
      function closeList() {
        if (listType) { out.push('</' + listType + '>'); listType = null; }
      }

      for (var i = 0; i < lines.length; i++) {
        var line = lines[i];

        // Heading
        var hm = line.match(/^(#{1,4})\s+(.+)$/);
        if (hm) {
          flushPara(); closeList();
          var n = hm[1].length;
          out.push('<h' + n + '>' + inline(hm[2]) + '</h' + n + '>');
          continue;
        }

        // Horizontal rule
        if (/^(-{3,}|\*{3,})\s*$/.test(line)) {
          flushPara(); closeList();
          out.push('<hr>');
          continue;
        }

        // Blockquote
        if (/^>\s?/.test(line)) {
          flushPara(); closeList();
          out.push('<blockquote>' + inline(line.replace(/^>\s?/, '')) + '</blockquote>');
          continue;
        }

        // Unordered list item
        var ulm = line.match(/^[ \t]*[-*]\s+(.+)$/);
        if (ulm) {
          flushPara();
          if (listType !== 'ul') { closeList(); out.push('<ul>'); listType = 'ul'; }
          out.push('<li>' + inline(ulm[1]) + '</li>');
          continue;
        }

        // Ordered list item
        var olm = line.match(/^[ \t]*\d+[.)]\s+(.+)$/);
        if (olm) {
          flushPara();
          if (listType !== 'ol') { closeList(); out.push('<ol>'); listType = 'ol'; }
          out.push('<li>' + inline(olm[1]) + '</li>');
          continue;
        }

        // Empty line
        if (!line.trim()) {
          flushPara(); closeList();
          continue;
        }

        // Regular text — if we were in a list, close it first
        if (listType) { closeList(); }
        para.push(line.trimStart());
      }

      flushPara(); closeList();
      return out.join('\n');
    }

    document.addEventListener('DOMContentLoaded', function () {
      var el = document.getElementById('doc-content');
      var key = window.location.hash ? window.location.hash.slice(1) : new URLSearchParams(window.location.search).get('f');

      if (!key || !window.__legalDocs || !window.__legalDocs[key]) {
        el.innerHTML = '<div class="doc-error">Document not found. <a href="index.html">Return to Legal Documents</a></div>';
        return;
      }

      el.innerHTML = renderMd(window.__legalDocs[key]);

      // Set browser tab title from the rendered H1
      var h1 = el.querySelector('h1');
      if (h1) {
        document.title = h1.textContent + ' \u2014 LantanaShare';
        var meta = document.createElement('p');
        meta.className = 'doc-meta';
        meta.textContent = 'LantanaShare \u00b7 Lantana Intelligence LLC \u00b7 Effective April 15, 2026';
        h1.insertAdjacentElement('afterend', meta);
      }
    });
  </script>
